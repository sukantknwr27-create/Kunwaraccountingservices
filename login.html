<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Kunwar Accounting Services</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body{background:var(--light);}
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:90px 1rem 2rem;}
    .card{background:white;border-radius:20px;border:1px solid var(--border);padding:2.25rem;width:100%;max-width:430px;box-shadow:0 8px 32px rgba(0,0,0,0.06);}
    .logo{text-align:center;margin-bottom:1.75rem;}
    .logo-icon{width:56px;height:56px;background:var(--navy);border-radius:14px;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;}
    .logo h2{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--navy);margin-bottom:3px;}
    .logo p{font-size:13px;color:var(--gray);}
    .tabs{display:flex;background:var(--light);border-radius:10px;padding:3px;margin-bottom:1.5rem;border:1px solid var(--border);}
    .tab{flex:1;padding:10px 6px;border:none;background:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;color:var(--gray);font-family:'DM Sans',sans-serif;transition:all 0.2s;}
    .tab.on{background:var(--navy);color:white;font-weight:600;}
    .panel{display:none;}.panel.on{display:block;}
    .stabs{display:flex;background:var(--light);border-radius:8px;padding:3px;margin-bottom:1.25rem;border:1px solid var(--border);}
    .stab{flex:1;padding:8px;border:none;background:none;border-radius:6px;font-size:13px;cursor:pointer;color:var(--gray);font-family:'DM Sans',sans-serif;transition:all 0.2s;}
    .stab.on{background:white;color:var(--navy);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,0.08);}
    #msg{border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:1rem;display:none;}
    #msg.err{background:#FEE2E2;color:#DC2626;border-left:3px solid #DC2626;}
    #msg.ok{background:#DCFCE7;color:#16A34A;border-left:3px solid #16A34A;}
    .btn{width:100%;background:var(--navy);color:white;padding:13px;border-radius:8px;font-size:14px;font-weight:600;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;margin-top:6px;}
    .btn:hover{background:var(--navy-dark);}
    .btn:disabled{opacity:0.55;cursor:not-allowed;}
    .gbtn{width:100%;background:white;color:#374151;padding:12px;border-radius:8px;font-size:14px;font-weight:600;border:1.5px solid var(--border);cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:10px;transition:all 0.2s;}
    .gbtn:hover{background:var(--light);}
    .orow{display:flex;gap:8px;}.orow input{flex:1;}
    .sbtn{background:var(--navy);color:white;border:none;padding:11px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;flex-shrink:0;}
    .sbtn:disabled{opacity:0.5;cursor:not-allowed;}
    .digits{display:flex;gap:8px;margin-top:10px;}
    .dig{flex:1;text-align:center;font-size:1.3rem;font-weight:700;padding:12px 4px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;outline:none;}
    .dig:focus{border-color:var(--navy);}
    .fl{text-align:center;margin-top:10px;font-size:13px;}
    .fl a{color:var(--navy);font-weight:600;cursor:pointer;text-decoration:none;}
    .anote{text-align:center;margin-top:1.25rem;font-size:13px;color:var(--gray);padding-top:1.25rem;border-top:1px solid var(--border);}
    .anote a{color:var(--navy);font-weight:600;text-decoration:none;}
    .sp{width:15px;height:15px;border:2px solid rgba(255,255,255,0.35);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
<div id="nav-placeholder"></div>

<!-- Firebase MUST load first and synchronously -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
// ── Init Firebase immediately after CDN loads ─────────────────
var fbApp = firebase.initializeApp({
  apiKey:            "AIzaSyDZYQYkyqUYqhmzu2vOtIdX2SrHDROiM0Y",
  authDomain:        "kunwar-accounting.firebaseapp.com",
  projectId:         "kunwar-accounting",
  storageBucket:     "kunwar-accounting.firebasestorage.app",
  messagingSenderId: "775485451446",
  appId:             "1:775485451446:web:6aa2c71f32302680670a17"
});
var auth = firebase.auth();
auth.languageCode = 'en';
var ADMIN = 'sukant@kunwaraccountingservices.in';

function isAdmin(u){ return u && u.email === ADMIN; }
function saveUser(u){
  if(!u){ localStorage.removeItem('kas_user_data'); return; }
  localStorage.setItem('kas_user_data', JSON.stringify({
    uid:u.uid, email:u.email||'', name:u.displayName||u.email||'Client',
    phone:u.phoneNumber||'', photo:u.photoURL||''
  }));
}

// Sync to Supabase (non-blocking)
function syncDB(u){
  if(!u||!SUPABASE_KEY) return;
  var h={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation'};
  var b=JSON.stringify({firebase_uid:u.uid,email:u.email||'',name:u.displayName||'',phone:u.phoneNumber||'',photo_url:u.photoURL||'',last_login:new Date().toISOString()});
  fetch(SUPABASE_URL+'/rest/v1/users?firebase_uid=eq.'+u.uid,{method:'PATCH',headers:h,body:b})
    .then(function(r){return r.json();})
    .then(function(d){
      if(!d||!d.length) fetch(SUPABASE_URL+'/rest/v1/users',{method:'POST',headers:h,body:JSON.stringify(JSON.parse(b))});
    }).catch(function(){});
}

// Redirect if already logged in
auth.onAuthStateChanged(function(user){
  if(user){ saveUser(user); window.location.href=isAdmin(user)?'admin.html':'dashboard.html'; }
});

// Helpers
function showErr(m){ var e=document.getElementById('msg'); e.className='err'; e.innerHTML='&#10060; '+m; e.style.display='block'; }
function showOk(m){  var e=document.getElementById('msg'); e.className='ok';  e.innerHTML='&#10003; '+m; e.style.display='block'; }
function clearMsg(){ document.getElementById('msg').style.display='none'; }
function busy(id,on,txt){ var b=document.getElementById(id); if(!b)return; b.disabled=on; b.innerHTML=on?'<span class="sp"></span>'+txt:txt; }

function showTab(t,el){
  clearMsg();
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  el.classList.add('on');
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('on');});
  document.getElementById('p-'+t).classList.add('on');
}
function showSub(s){
  clearMsg();
  document.getElementById('st-li').classList.toggle('on',s==='li');
  document.getElementById('st-su').classList.toggle('on',s==='su');
  document.getElementById('f-li').style.display=s==='li'?'block':'none';
  document.getElementById('f-su').style.display=s==='su'?'block':'none';
}

// ── EMAIL LOGIN ───────────────────────────────────────────────
function doLogin(){
  clearMsg();
  var email=document.getElementById('li-email').value.trim();
  var pwd=document.getElementById('li-pwd').value;
  if(!email){showErr('Please enter your email address.');return;}
  if(!pwd){showErr('Please enter your password.');return;}
  busy('li-btn',true,'Logging in...');
  auth.signInWithEmailAndPassword(email,pwd)
    .then(function(c){
      saveUser(c.user); syncDB(c.user);
      showOk('Login successful! Redirecting...');
      setTimeout(function(){ window.location.href=isAdmin(c.user)?'admin.html':'dashboard.html'; },800);
    })
    .catch(function(e){
      var m='Incorrect email or password. Please try again.';
      if(e.code==='auth/user-not-found')m='No account found. Please sign up first.';
      else if(e.code==='auth/too-many-requests')m='Too many attempts. Please wait a few minutes.';
      else if(e.code==='auth/network-request-failed')m='Network error. Check your internet connection.';
      showErr(m);
      busy('li-btn',false,'Login to My Account →');
    });
}

// ── EMAIL SIGNUP ──────────────────────────────────────────────
function doSignup(){
  clearMsg();
  var name=document.getElementById('su-name').value.trim();
  var phone=document.getElementById('su-phone').value.trim();
  var email=document.getElementById('su-email').value.trim();
  var pwd=document.getElementById('su-pwd').value;
  if(!name){showErr('Please enter your name.');return;}
  if(!phone){showErr('Please enter your phone number.');return;}
  if(!email){showErr('Please enter your email address.');return;}
  if(!pwd||pwd.length<6){showErr('Password must be at least 6 characters.');return;}
  busy('su-btn',true,'Creating account...');
  auth.createUserWithEmailAndPassword(email,pwd)
    .then(function(c){
      return c.user.updateProfile({displayName:name}).then(function(){
        var u={uid:c.user.uid,email:email,displayName:name,phoneNumber:phone,photoURL:''};
        saveUser(u); syncDB(u);
        showOk('Account created! Redirecting...');
        setTimeout(function(){window.location.href='dashboard.html';},1200);
      });
    })
    .catch(function(e){
      var m='Signup failed. Please try again.';
      if(e.code==='auth/email-already-in-use')m='This email is already registered. Please login.';
      else if(e.code==='auth/invalid-email')m='Please enter a valid email address.';
      else if(e.code==='auth/weak-password')m='Password must be at least 6 characters.';
      showErr(m);
      busy('su-btn',false,'Create My Account →');
    });
}

// ── GOOGLE ────────────────────────────────────────────────────
function doGoogle(){
  clearMsg();
  document.getElementById('g-btn').disabled=true;
  document.getElementById('g-btn').textContent='Opening Google...';
  var provider=new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider)
    .then(function(r){
      saveUser(r.user); syncDB(r.user);
      showOk('Google login successful! Redirecting...');
      setTimeout(function(){window.location.href=isAdmin(r.user)?'admin.html':'dashboard.html';},800);
    })
    .catch(function(e){
      if(e.code!=='auth/popup-closed-by-user'){
        if(e.code==='auth/unauthorized-domain')showErr('Add your domain to Firebase Authorized Domains first.');
        else showErr('Google sign-in failed. Try again. ('+e.code+')');
      } else clearMsg();
      document.getElementById('g-btn').disabled=false;
      document.getElementById('g-btn').textContent='Continue with Google';
    });
}

// ── FORGOT PASSWORD ───────────────────────────────────────────
function doForgot(){
  clearMsg();
  var email=document.getElementById('li-email').value.trim();
  if(!email){showErr('Enter your email address first, then click Forgot Password.');return;}
  auth.sendPasswordResetEmail(email)
    .then(function(){showOk('Reset link sent! Check your inbox.');})
    .catch(function(){showErr('Could not send reset email. Check the address.');});
}

// ── EMAIL OTP ─────────────────────────────────────────────────
var otpCode=null, otpEmail=null, cdInt=null;
function doSendOTP(){
  clearMsg();
  var email=document.getElementById('otp-email').value.trim();
  if(!email||!/\S+@\S+\.\S+/.test(email)){showErr('Please enter a valid email address.');return;}
  otpCode=Math.floor(100000+Math.random()*900000).toString();
  otpEmail=email;
  localStorage.setItem('kas_otp',JSON.stringify({code:otpCode,email:email,time:Date.now()}));
  var btn=document.getElementById('send-btn');
  btn.disabled=true; btn.textContent='Sending...';
  // Send via Firebase email sign-in link OR show code for testing
  // For production use EmailJS or any email API
  // For now we use Firebase anonymous then verify
  showOk('OTP generated: ' + otpCode + ' (For production, integrate EmailJS to send via email)');
  document.getElementById('otp-s1').style.display='none';
  document.getElementById('otp-s2').style.display='block';
  document.querySelector('.dig').focus();
  var s=60; var cd=document.getElementById('otp-cd');
  cdInt=setInterval(function(){s--;cd.textContent=s>0?'Resend in '+s+'s':'';if(s<=0){clearInterval(cdInt);btn.disabled=false;btn.textContent='Resend OTP';}},1000);
}
function digNext(el){if(el.value.length>1)el.value=el.value.slice(-1);if(el.value&&el.nextElementSibling)el.nextElementSibling.focus();}
function doVerify(){
  clearMsg();
  var entered=Array.from(document.querySelectorAll('.dig')).map(function(i){return i.value;}).join('');
  if(entered.length<6){showErr('Please enter all 6 digits.');return;}
  var stored=JSON.parse(localStorage.getItem('kas_otp')||'{}');
  if(!stored.code){showErr('Please send OTP first.');return;}
  if(Date.now()-stored.time>600000){showErr('OTP expired. Please request a new one.');return;}
  if(entered!==stored.code){showErr('Incorrect OTP. Please try again.');return;}
  localStorage.removeItem('kas_otp');
  busy('vbtn',true,'Verifying...');
  // Sign in or create account with the email
  auth.signInWithEmailAndPassword(stored.email,'KAS_'+stored.code+'_temp')
    .catch(function(){return auth.createUserWithEmailAndPassword(stored.email,'KAS_'+stored.code+'_temp');})
    .then(function(c){
      saveUser(c.user); syncDB(c.user);
      showOk('Login successful! Redirecting...');
      setTimeout(function(){window.location.href='dashboard.html';},800);
    })
    .catch(function(e){showErr('Could not complete login. Please use Email tab instead.');busy('vbtn',false,'Verify & Login →');});
}
function resetOTP(){
  clearMsg(); clearInterval(cdInt);
  document.getElementById('otp-s1').style.display='block';
  document.getElementById('otp-s2').style.display='none';
  document.querySelectorAll('.dig').forEach(function(i){i.value='';});
  otpCode=null; otpEmail=null;
  document.getElementById('send-btn').disabled=false;
  document.getElementById('send-btn').textContent='Send OTP';
  document.getElementById('otp-cd').textContent='';
}

// Enter key
document.addEventListener('keydown',function(e){
  if(e.key!=='Enter')return;
  if(document.getElementById('p-email').classList.contains('on')){
    if(document.getElementById('f-li').style.display!=='none')doLogin();
    else doSignup();
  }
});
</script>

<div class="wrap">
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <svg width="30" height="30" viewBox="0 0 28 28" fill="none">
          <rect x="4" y="14" width="4" height="10" rx="1" fill="white"/>
          <rect x="12" y="9" width="4" height="15" rx="1" fill="white"/>
          <rect x="20" y="4" width="4" height="20" rx="1" fill="white"/>
          <path d="M6 12 L14 7 L22 4" stroke="#C9973A" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h2>My Account</h2>
      <p>Kunwar Accounting Services</p>
    </div>

    <div id="msg"></div>

    <div class="tabs">
      <button class="tab on"  onclick="showTab('email',this)">📧 Email</button>
      <button class="tab"     onclick="showTab('google',this)">🔵 Google</button>
      <button class="tab"     onclick="showTab('otp',this)">📱 OTP</button>
    </div>

    <!-- EMAIL -->
    <div class="panel on" id="p-email">
      <div class="stabs">
        <button class="stab on" id="st-li" onclick="showSub('li')">Login</button>
        <button class="stab"    id="st-su" onclick="showSub('su')">Sign Up</button>
      </div>
      <div id="f-li">
        <div class="form-group"><label>Email Address</label><input type="email" id="li-email" placeholder="raj@business.com" autocomplete="email"/></div>
        <div class="form-group"><label>Password</label><input type="password" id="li-pwd" placeholder="••••••••" autocomplete="current-password"/></div>
        <button class="btn" id="li-btn" onclick="doLogin()">Login to My Account →</button>
        <div class="fl"><a onclick="doForgot()">Forgot password?</a></div>
      </div>
      <div id="f-su" style="display:none;">
        <div class="form-group"><label>Full Name *</label><input type="text" id="su-name" placeholder="Raj Sharma"/></div>
        <div class="form-group"><label>Phone Number *</label><input type="tel" id="su-phone" placeholder="+91 98765 43210"/></div>
        <div class="form-group"><label>Business Name</label><input type="text" id="su-biz" placeholder="Raj Enterprises (optional)"/></div>
        <div class="form-group"><label>Email Address *</label><input type="email" id="su-email" placeholder="raj@business.com"/></div>
        <div class="form-group"><label>Password * (min 6 chars)</label><input type="password" id="su-pwd" placeholder="••••••••"/></div>
        <button class="btn" id="su-btn" onclick="doSignup()">Create My Account →</button>
      </div>
    </div>

    <!-- GOOGLE -->
    <div class="panel" id="p-google">
      <p style="text-align:center;font-size:14px;color:var(--gray);margin-bottom:1.5rem;line-height:1.7;">Sign in instantly with your Google account. No password needed.</p>
      <button class="gbtn" id="g-btn" onclick="doGoogle()">
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continue with Google
      </button>
    </div>

    <!-- OTP -->
    <div class="panel" id="p-otp">
      <div id="otp-s1">
        <p style="font-size:13px;color:var(--gray);margin-bottom:1rem;text-align:center;line-height:1.7;">Enter your email to receive a 6-digit OTP code.</p>
        <div class="form-group">
          <label>Email Address</label>
          <div class="orow">
            <input type="email" id="otp-email" placeholder="raj@business.com"/>
            <button class="sbtn" id="send-btn" onclick="doSendOTP()">Send OTP</button>
          </div>
        </div>
        <div style="font-size:12px;color:var(--gray);text-align:center;" id="otp-cd"></div>
      </div>
      <div id="otp-s2" style="display:none;">
        <div style="background:var(--ice);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--navy);margin-bottom:12px;border-left:3px solid var(--navy);">📧 Check your email for the OTP code.</div>
        <div class="form-group">
          <label>Enter 6-Digit OTP</label>
          <div class="digits">
            <input class="dig" type="number" oninput="digNext(this)"/>
            <input class="dig" type="number" oninput="digNext(this)"/>
            <input class="dig" type="number" oninput="digNext(this)"/>
            <input class="dig" type="number" oninput="digNext(this)"/>
            <input class="dig" type="number" oninput="digNext(this)"/>
            <input class="dig" type="number" oninput="digNext(this)"/>
          </div>
        </div>
        <button class="btn" id="vbtn" onclick="doVerify()">Verify & Login →</button>
        <div class="fl"><a onclick="resetOTP()">← Change email</a></div>
      </div>
    </div>

    <div class="anote">Admin? <a href="admin-login.html">Admin Portal →</a></div>
  </div>
</div>

<script src="supabase.js"></script>
<script src="nav.js"></script>
<script>if(typeof injectNav==='function')injectNav('login');</script>
</body>
</html>
