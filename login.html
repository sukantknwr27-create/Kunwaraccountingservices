<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="shortcut icon" href="favicon.svg"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Account | Kunwar Accounting Services</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <a href="index.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;margin-bottom:2rem;justify-content:center;">
      <div style="width:40px;height:40px;background:#0C447C;border-radius:9px;display:flex;align-items:center;justify-content:center;">
        <svg width="22" height="22" viewBox="0 0 28 28" fill="none"><rect x="4" y="14" width="4" height="10" rx="1" fill="white"/><rect x="12" y="9" width="4" height="15" rx="1" fill="white"/><rect x="20" y="4" width="4" height="20" rx="1" fill="white"/></svg>
      </div>
      <div>
        <div style="font-size:16px;font-weight:600;color:#0C447C;font-family:'Playfair Display',serif;">Kunwar</div>
        <div style="font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:#6B7280;">Accounting Services</div>
      </div>
    </a>

    <div class="tab-bar">
      <button class="tab-btn active" onclick="show('login',this)">Login</button>
      <button class="tab-btn" onclick="show('signup',this)">Create Account</button>
    </div>

    <div id="msg-err" class="err-msg"></div>
    <div id="msg-ok" class="ok-msg"></div>

    <div id="login-form">
      <div class="form-group"><label>Email address</label><input type="email" id="li-email" placeholder="raj@business.com"/></div>
      <div class="form-group"><label>Password</label><input type="password" id="li-pwd" placeholder="••••••••"/></div>
      <button class="auth-btn" id="li-btn" onclick="doLogin()">Login to My Account</button>
      <div style="text-align:center;margin-top:1rem;">
        <a href="admin-login.html" style="font-size:13px;color:#6B7280;text-decoration:none;">Admin? Login here →</a>
      </div>
    </div>

    <div id="signup-form" style="display:none;">
      <div class="form-group"><label>Full name *</label><input type="text" id="su-name" placeholder="Raj Sharma"/></div>
      <div class="form-group"><label>Phone *</label><input type="tel" id="su-phone" placeholder="+91 98XXX XXXXX"/></div>
      <div class="form-group"><label>Business name</label><input type="text" id="su-biz" placeholder="Raj Enterprises"/></div>
      <div class="form-group"><label>Email address *</label><input type="email" id="su-email" placeholder="raj@business.com"/></div>
      <div class="form-group"><label>Password * (min 6 chars)</label><input type="password" id="su-pwd" placeholder="••••••••"/></div>
      <button class="auth-btn" id="su-btn" onclick="doSignup()">Create My Account</button>
    </div>

    <div style="text-align:center;margin-top:1.5rem;">
      <a href="index.html" style="font-size:13px;color:#6B7280;text-decoration:none;">← Back to website</a>
    </div>
  </div>
</div>

<script src="supabase.js"></script>
<script>
if(getToken()) window.location.href='dashboard.html';

function show(tab,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('login-form').style.display=tab==='login'?'block':'none';
  document.getElementById('signup-form').style.display=tab==='signup'?'block':'none';
  document.getElementById('msg-err').style.display='none';
  document.getElementById('msg-ok').style.display='none';
}

function showErr(m){const e=document.getElementById('msg-err');e.textContent=m;e.style.display='block';document.getElementById('msg-ok').style.display='none';}
function showOk(m){const e=document.getElementById('msg-ok');e.textContent=m;e.style.display='block';document.getElementById('msg-err').style.display='none';}

async function doLogin(){
  const email=document.getElementById('li-email').value.trim();
  const pwd=document.getElementById('li-pwd').value;
  if(!email||!pwd){showErr('Please enter your email and password.');return;}
  const btn=document.getElementById('li-btn');
  btn.disabled=true;btn.textContent='Logging in...';
  try{
    await signIn(email,pwd);
    window.location.href=isAdmin()?'admin.html':'dashboard.html';
  }catch(e){showErr('Invalid email or password. Please try again.');}
  btn.disabled=false;btn.textContent='Login to My Account';
}

async function doSignup(){
  const name=document.getElementById('su-name').value.trim();
  const phone=document.getElementById('su-phone').value.trim();
  const biz=document.getElementById('su-biz').value.trim();
  const email=document.getElementById('su-email').value.trim();
  const pwd=document.getElementById('su-pwd').value;
  if(!name||!email||!pwd){showErr('Please fill in all required fields.');return;}
  if(pwd.length<6){showErr('Password must be at least 6 characters.');return;}
  const btn=document.getElementById('su-btn');
  btn.disabled=true;btn.textContent='Creating account...';
  try{
    await signUp(email,pwd,name,phone,biz);
    showOk('Account created! Please check your email to verify, then login.');
    show('login',document.querySelectorAll('.tab-btn')[0]);
  }catch(e){showErr(e.message||'Something went wrong. Please try again.');}
  btn.disabled=false;btn.textContent='Create My Account';
}

document.addEventListener('keydown',e=>{if(e.key==='Enter'){const lf=document.getElementById('login-form');lf.style.display!=='none'?doLogin():doSignup();}});
</script>
</body>
</html>
