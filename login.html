<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="shortcut icon" href="favicon.svg"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Kunwar Accounting Services</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { background: var(--light); }
    .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; padding-top: 80px; }
    .auth-card { background: white; border-radius: 20px; border: 1px solid var(--border); padding: 2.25rem; width: 100%; max-width: 440px; box-shadow: 0 8px 32px rgba(0,0,0,0.06); }
    .auth-logo { text-align: center; margin-bottom: 1.75rem; }
    .auth-logo-icon { width: 56px; height: 56px; background: var(--navy); border-radius: 14px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; }
    .auth-logo h2 { font-family: 'Playfair Display',serif; font-size: 1.4rem; color: var(--navy); margin-bottom: 3px; }
    .auth-logo p { font-size: 13px; color: var(--gray); }
    .tab-bar { display: flex; background: var(--light); border-radius: 10px; padding: 3px; margin-bottom: 1.5rem; border: 1px solid var(--border); }
    .tab-btn { flex: 1; padding: 9px 6px; border: none; background: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--gray); font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
    .tab-btn.active { background: white; color: var(--navy); box-shadow: 0 1px 4px rgba(0,0,0,0.08); font-weight: 600; }
    .form-panel { display: none; }
    .form-panel.active { display: block; animation: fadeUp 0.3s ease; }
    .err-msg { background: #FEE2E2; color: #DC2626; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 1rem; display: none; }
    .ok-msg  { background: #DCFCE7; color: #16A34A; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 1rem; display: none; }
    .auth-btn { width: 100%; background: var(--navy); color: white; padding: 13px; border-radius: 8px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; margin-top: 4px; }
    .auth-btn:hover { background: var(--navy-dark); }
    .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .google-btn { width: 100%; background: white; color: #374151; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 600; border: 1.5px solid var(--border); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 1rem; }
    .google-btn:hover { background: var(--light); border-color: #9CA3AF; }
    .or-divider { display: flex; align-items: center; gap: 12px; margin: 1rem 0; }
    .or-divider::before, .or-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .or-divider span { font-size: 12px; color: var(--gray); white-space: nowrap; }
    .otp-row { display: flex; gap: 8px; }
    .otp-row input { flex: 1; }
    .otp-row button { white-space: nowrap; background: var(--navy); color: white; border: none; padding: 11px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; flex-shrink: 0; }
    .otp-row button:disabled { opacity: 0.5; cursor: not-allowed; }
    .otp-digits { display: flex; gap: 8px; margin-top: 1rem; }
    .otp-digits input { flex: 1; text-align: center; font-size: 1.2rem; font-weight: 700; padding: 12px 4px; border: 1.5px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; color: var(--charcoal); outline: none; }
    .otp-digits input:focus { border-color: var(--navy); }
    .otp-sent-msg { background: var(--ice); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--navy); margin-top: 1rem; display: none; border-left: 3px solid var(--navy); }
    .back-link { text-align: center; margin-top: 1.25rem; font-size: 13px; color: var(--gray); }
    .back-link a { color: var(--navy); font-weight: 600; text-decoration: none; }
    .terms-note { font-size: 11px; color: var(--gray); text-align: center; margin-top: 1rem; line-height: 1.6; }
    .countdown { font-size: 12px; color: var(--gray); text-align: center; margin-top: 8px; display: none; }
    #recaptcha-container { margin-top: 8px; }
    .user-type-badge { display: inline-flex; align-items: center; gap: 6px; background: #FEF3C7; color: #92400E; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 1rem; }
    .admin-note { text-align: center; margin-top: 1rem; font-size: 13px; color: var(--gray); }
    .admin-note a { color: var(--navy); font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>
<div id="nav-placeholder"></div>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg width="30" height="30" viewBox="0 0 28 28" fill="none">
          <rect x="4" y="14" width="4" height="10" rx="1" fill="white"/>
          <rect x="12" y="9" width="4" height="15" rx="1" fill="white"/>
          <rect x="20" y="4" width="4" height="20" rx="1" fill="white"/>
          <path d="M6 12 L14 7 L22 4" stroke="#C9973A" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h2>My Account</h2>
      <p>Kunwar Accounting Services</p>
    </div>

    <!-- TABS -->
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('email',this)">📧 Email</button>
      <button class="tab-btn" onclick="switchTab('google',this)">🔵 Google</button>
      <button class="tab-btn" onclick="switchTab('phone',this)">📱 Mobile OTP</button>
    </div>

    <div id="global-err" class="err-msg"></div>
    <div id="global-ok"  class="ok-msg"></div>

    <!-- EMAIL PANEL -->
    <div class="form-panel active" id="panel-email">
      <div class="tab-bar" style="margin-bottom:1.25rem;">
        <button class="tab-btn active" id="sub-login" onclick="switchSubTab('login',this)">Login</button>
        <button class="tab-btn" id="sub-signup" onclick="switchSubTab('signup',this)">Sign Up</button>
      </div>

      <!-- Login form -->
      <div id="email-login-form">
        <div class="form-group"><label>Email address</label><input type="email" id="li-email" placeholder="raj@business.com"/></div>
        <div class="form-group"><label>Password</label><input type="password" id="li-pwd" placeholder="••••••••"/></div>
        <button class="auth-btn" id="li-btn" onclick="doEmailLogin()">Login to My Account →</button>
        <div class="back-link" style="margin-top:10px;"><a href="#" onclick="showForgotPwd();return false;">Forgot password?</a></div>
      </div>

      <!-- Signup form -->
      <div id="email-signup-form" style="display:none;">
        <div class="form-group"><label>Full Name *</label><input type="text" id="su-name" placeholder="Raj Sharma"/></div>
        <div class="form-group"><label>Phone Number *</label><input type="tel" id="su-phone" placeholder="+91 98XXX XXXXX"/></div>
        <div class="form-group"><label>Business Name</label><input type="text" id="su-biz" placeholder="Raj Enterprises (optional)"/></div>
        <div class="form-group"><label>Email Address *</label><input type="email" id="su-email" placeholder="raj@business.com"/></div>
        <div class="form-group"><label>Password * (min 6 characters)</label><input type="password" id="su-pwd" placeholder="••••••••"/></div>
        <button class="auth-btn" id="su-btn" onclick="doEmailSignup()">Create My Account →</button>
      </div>
    </div>

    <!-- GOOGLE PANEL -->
    <div class="form-panel" id="panel-google">
      <p style="text-align:center;font-size:14px;color:var(--gray);margin-bottom:1.5rem;line-height:1.7;">Sign in instantly with your Google account. No password needed.</p>
      <button class="google-btn" onclick="doGoogleLogin()">
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Continue with Google
      </button>
      <div class="terms-note">By signing in, you agree to our terms. Your Google account info is kept private.</div>
    </div>

    <!-- PHONE OTP PANEL -->
    <div class="form-panel" id="panel-phone">
      <div id="otp-step-1">
        <div class="form-group">
          <label>Indian Mobile Number</label>
          <div class="otp-row">
            <input type="tel" id="phone-num" placeholder="+91 98765 43210" maxlength="14"/>
            <button id="send-otp-btn" onclick="doSendOTP()">Send OTP</button>
          </div>
        </div>
        <div id="recaptcha-container"></div>
        <div class="countdown" id="otp-countdown"></div>
      </div>
      <div id="otp-step-2" style="display:none;">
        <div class="otp-sent-msg" id="otp-sent-msg" style="display:block;">
          📱 OTP sent! Check your messages.
        </div>
        <div class="form-group" style="margin-top:1rem;">
          <label>Enter 6-digit OTP</label>
          <div class="otp-digits">
            <input type="number" maxlength="1" class="otp-digit" oninput="otpInput(this)"/>
            <input type="number" maxlength="1" class="otp-digit" oninput="otpInput(this)"/>
            <input type="number" maxlength="1" class="otp-digit" oninput="otpInput(this)"/>
            <input type="number" maxlength="1" class="otp-digit" oninput="otpInput(this)"/>
            <input type="number" maxlength="1" class="otp-digit" oninput="otpInput(this)"/>
            <input type="number" maxlength="1" class="otp-digit" oninput="otpInput(this)"/>
          </div>
        </div>
        <!-- Name for new phone users -->
        <div id="phone-name-wrap" style="display:none;">
          <div class="form-group"><label>Your Name *</label><input type="text" id="phone-name" placeholder="Raj Sharma"/></div>
          <div class="form-group"><label>Email (optional)</label><input type="email" id="phone-email" placeholder="raj@business.com"/></div>
        </div>
        <button class="auth-btn" id="verify-btn" onclick="doVerifyOTP()">Verify & Login →</button>
        <div class="back-link"><a href="#" onclick="resetOTP();return false;">← Change number</a></div>
      </div>
    </div>

    <div class="admin-note">Admin? <a href="admin-login.html">Admin Portal →</a></div>
  </div>
</div>

<script src="supabase.js"></script>
<script src="nav.js"></script>
<script type="module">
import { signInWithGoogle, signUpEmail, signInEmail,
         sendOTP, verifyOTP, kasSignOut, onUserChanged, getCurrentUser }
  from './firebase.js';

injectNav('login');

// Redirect if already logged in
onUserChanged(user => {
  if (user) window.location.href = 'dashboard.html';
});

function showErr(msg) {
  const e = document.getElementById('global-err');
  e.textContent = msg; e.style.display = 'block';
  document.getElementById('global-ok').style.display = 'none';
}
function showOk(msg) {
  const e = document.getElementById('global-ok');
  e.textContent = msg; e.style.display = 'block';
  document.getElementById('global-err').style.display = 'none';
}
function clearMsgs() {
  document.getElementById('global-err').style.display = 'none';
  document.getElementById('global-ok').style.display = 'none';
}

// Make functions global
window.switchTab = function(tab, btn) {
  clearMsgs();
  document.querySelectorAll('.tab-bar .tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
};

window.switchSubTab = function(sub, btn) {
  clearMsgs();
  document.getElementById('sub-login').classList.toggle('active', sub === 'login');
  document.getElementById('sub-signup').classList.toggle('active', sub === 'signup');
  document.getElementById('email-login-form').style.display = sub === 'login' ? 'block' : 'none';
  document.getElementById('email-signup-form').style.display = sub === 'signup' ? 'block' : 'none';
};

window.doEmailLogin = async function() {
  const email = document.getElementById('li-email').value.trim();
  const pwd = document.getElementById('li-pwd').value;
  if (!email || !pwd) { showErr('Please enter email and password.'); return; }
  const btn = document.getElementById('li-btn');
  btn.disabled = true; btn.textContent = 'Logging in...';
  clearMsgs();
  try {
    await signInEmail(email, pwd);
    window.location.href = 'dashboard.html';
  } catch(e) {
    showErr(e.code === 'auth/invalid-credential' ? 'Invalid email or password.' : e.message);
  }
  btn.disabled = false; btn.textContent = 'Login to My Account →';
};

window.doEmailSignup = async function() {
  const name  = document.getElementById('su-name').value.trim();
  const phone = document.getElementById('su-phone').value.trim();
  const email = document.getElementById('su-email').value.trim();
  const pwd   = document.getElementById('su-pwd').value;
  if (!name || !phone || !email || !pwd) { showErr('Please fill all required fields.'); return; }
  if (pwd.length < 6) { showErr('Password must be at least 6 characters.'); return; }
  const btn = document.getElementById('su-btn');
  btn.disabled = true; btn.textContent = 'Creating account...';
  clearMsgs();
  try {
    await signUpEmail(email, pwd, name, phone);
    showOk('✓ Account created! Welcome to Kunwar Accounting Services.');
    setTimeout(() => window.location.href = 'dashboard.html', 1500);
  } catch(e) {
    showErr(e.code === 'auth/email-already-in-use' ? 'This email is already registered. Please login.' : e.message);
  }
  btn.disabled = false; btn.textContent = 'Create My Account →';
};

window.doGoogleLogin = async function() {
  clearMsgs();
  try {
    await signInWithGoogle();
    window.location.href = 'dashboard.html';
  } catch(e) {
    if (e.code !== 'auth/popup-closed-by-user') showErr('Google sign-in failed. Please try again.');
  }
};

let otpSent = false;
let countdown;

window.doSendOTP = async function() {
  let phone = document.getElementById('phone-num').value.trim();
  if (!phone) { showErr('Please enter your mobile number.'); return; }
  // Auto format
  if (!phone.startsWith('+')) phone = '+91' + phone.replace(/\D/g,'');
  if (phone.replace(/\D/g,'').length < 12) { showErr('Please enter a valid 10-digit mobile number.'); return; }

  const btn = document.getElementById('send-otp-btn');
  btn.disabled = true; btn.textContent = 'Sending...';
  clearMsgs();
  try {
    await sendOTP(phone);
    otpSent = true;
    document.getElementById('otp-step-1').style.display = 'none';
    document.getElementById('otp-step-2').style.display = 'block';
    document.querySelector('.otp-digit').focus();
    // 30s countdown
    let secs = 30;
    const cd = document.getElementById('otp-countdown');
    cd.style.display = 'block';
    countdown = setInterval(() => {
      secs--;
      cd.textContent = `Resend OTP in ${secs}s`;
      if (secs <= 0) { clearInterval(countdown); cd.textContent = ''; }
    }, 1000);
  } catch(e) {
    showErr('Failed to send OTP. Check number and try again.');
    btn.disabled = false; btn.textContent = 'Send OTP';
  }
};

window.otpInput = function(el) {
  const val = el.value.slice(-1);
  el.value = val;
  if (val && el.nextElementSibling) el.nextElementSibling.focus();
};

window.doVerifyOTP = async function() {
  const digits = [...document.querySelectorAll('.otp-digit')].map(i => i.value).join('');
  if (digits.length < 6) { showErr('Please enter the complete 6-digit OTP.'); return; }
  const btn = document.getElementById('verify-btn');
  btn.disabled = true; btn.textContent = 'Verifying...';
  clearMsgs();
  try {
    const user = await verifyOTP(digits);
    // If new user with no display name, show name fields
    if (!user.displayName) {
      document.getElementById('phone-name-wrap').style.display = 'block';
      showOk('OTP verified! Please enter your name to continue.');
      btn.textContent = 'Complete Setup →';
      btn.disabled = false;
      btn.onclick = completePhoneSetup;
      return;
    }
    window.location.href = 'dashboard.html';
  } catch(e) {
    showErr('Invalid OTP. Please try again.');
    btn.disabled = false; btn.textContent = 'Verify & Login →';
  }
};

async function completePhoneSetup() {
  const name = document.getElementById('phone-name').value.trim();
  if (!name) { showErr('Please enter your name.'); return; }
  // Update profile
  const { auth } = await import('./firebase.js');
  const { updateProfile } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
  await updateProfile(auth.currentUser, { displayName: name });
  window.location.href = 'dashboard.html';
}

window.resetOTP = function() {
  otpSent = false;
  clearInterval(countdown);
  document.getElementById('otp-step-1').style.display = 'block';
  document.getElementById('otp-step-2').style.display = 'none';
  document.getElementById('send-otp-btn').disabled = false;
  document.getElementById('send-otp-btn').textContent = 'Send OTP';
  document.querySelectorAll('.otp-digit').forEach(i => i.value = '');
  clearMsgs();
};

window.showForgotPwd = async function() {
  const email = document.getElementById('li-email').value.trim();
  if (!email) { showErr('Enter your email address first, then click Forgot Password.'); return; }
  const { sendPasswordResetEmail } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
  const { auth } = await import('./firebase.js');
  try {
    await sendPasswordResetEmail(auth, email);
    showOk('✓ Password reset email sent! Check your inbox.');
  } catch(e) { showErr('Could not send reset email. Check your email address.'); }
};
</script>
</body>
</html>
