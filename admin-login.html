<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login | Kunwar Accounting Services</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;font-family:'DM Sans',sans-serif;}
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@600&display=swap');
    .card{background:#1e293b;border:1px solid #334155;border-radius:20px;padding:2.5rem;width:100%;max-width:400px;}
    .logo{text-align:center;margin-bottom:2rem;}
    .logo-icon{width:60px;height:60px;background:#0C447C;border-radius:16px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;}
    .logo h2{font-size:1.4rem;color:white;margin-bottom:4px;font-family:'Playfair Display',serif;}
    .logo p{font-size:12px;color:#64748b;}
    .badge{display:inline-block;background:#C9973A;color:#042C53;font-size:10px;font-weight:700;padding:3px 10px;border-radius:4px;text-transform:uppercase;letter-spacing:0.08em;margin-top:8px;}
    .group{margin-bottom:1rem;}
    .group label{display:block;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
    .group input{width:100%;background:#0f172a;border:1px solid #334155;color:white;padding:12px 14px;border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;}
    .group input:focus{border-color:#378ADD;}
    .abtn{width:100%;background:#0C447C;color:white;padding:13px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px;}
    .abtn:hover{background:#185FA5;}
    .abtn:disabled{opacity:0.55;cursor:not-allowed;}
    .err{background:rgba(220,38,38,.12);color:#f87171;border:1px solid rgba(220,38,38,.25);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:1rem;display:none;}
    .ok{background:rgba(22,163,74,.12);color:#4ade80;border:1px solid rgba(22,163,74,.25);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:1rem;display:none;}
    .note{background:rgba(12,68,124,.2);border:1px solid rgba(12,68,124,.35);border-radius:8px;padding:10px 14px;font-size:12px;color:#64748b;margin-top:1.5rem;text-align:center;}
    .links{display:flex;justify-content:center;gap:1.5rem;margin-top:1.25rem;}
    .links a{font-size:13px;color:#475569;text-decoration:none;}
    .links a:hover{color:#94a3b8;}
    .sp{width:15px;height:15px;border:2px solid rgba(255,255,255,0.35);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
<!-- Firebase CDN compat scripts -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="supabase.js"></script>
<script src="firebase.js"></script>
<script>
var ADMIN = 'sukant@kunwaraccountingservices.in';

// Check if already logged in as admin
kasOnAuthChanged(function(user) {
  if (user && kasIsAdmin(user)) { window.location.href = 'admin.html'; return; }
  if (user && !kasIsAdmin(user)) { kasSignOut(); }
});

function showErr(m){ var e=document.getElementById('err'); e.textContent=m; e.style.display='block'; document.getElementById('ok').style.display='none'; }
function showOk(m){  var e=document.getElementById('ok');  e.textContent=m; e.style.display='block'; document.getElementById('err').style.display='none'; }

function doLogin() {
  var email = document.getElementById('a-email').value.trim();
  var pwd   = document.getElementById('a-pwd').value;
  document.getElementById('err').style.display='none';
  document.getElementById('ok').style.display='none';
  if (!email || !pwd) { showErr('Please enter email and password.'); return; }
  if (email !== ADMIN) { showErr('Access denied. Admin only.'); return; }
  var btn = document.getElementById('a-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="sp"></span> Logging in...';
  kasSignInEmail(email, pwd)
    .then(function(user) {
      if (!kasIsAdmin(user)) { kasSignOut(); showErr('Access denied.'); btn.disabled=false; btn.textContent='Login to Admin Panel'; return; }
      showOk('✓ Login successful! Redirecting...');
      setTimeout(function(){ window.location.href='admin.html'; }, 800);
    })
    .catch(function(e) {
      var m = 'Incorrect password. Please try again.';
      if (e.code==='auth/user-not-found') m = 'Admin account not found in Firebase. Please create it first.';
      else if (e.code==='auth/too-many-requests') m = 'Too many attempts. Please wait a few minutes.';
      showErr(m);
      btn.disabled = false;
      btn.textContent = 'Login to Admin Panel';
    });
}

function doReset() {
  kasResetPassword(ADMIN)
    .then(function(){ showOk('Reset email sent! Check your inbox.'); })
    .catch(function(){ showErr('Could not send reset email.'); });
}

document.addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
</script>

<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg width="32" height="32" viewBox="0 0 28 28" fill="none">
        <rect x="4" y="14" width="4" height="10" rx="1" fill="white"/>
        <rect x="12" y="9" width="4" height="15" rx="1" fill="white"/>
        <rect x="20" y="4" width="4" height="20" rx="1" fill="white"/>
        <path d="M6 12 L14 7 L22 4" stroke="#C9973A" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <h2>Kunwar Accounting</h2>
    <p>Admin Control Panel</p>
    <div><span class="badge">🔐 Admin Only</span></div>
  </div>
  <div class="err" id="err"></div>
  <div class="ok"  id="ok"></div>
  <div class="group">
    <label>Admin Email</label>
    <input type="email" id="a-email" value="sukant@kunwaraccountingservices.in"/>
  </div>
  <div class="group">
    <label>Password</label>
    <input type="password" id="a-pwd" placeholder="••••••••"/>
  </div>
  <button class="abtn" id="a-btn" onclick="doLogin()">Login to Admin Panel</button>
  <div style="text-align:center;margin-top:1rem;">
    <button onclick="doReset()" style="background:none;border:none;color:#475569;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;">Forgot password?</button>
  </div>
  <div class="note">🔒 Restricted to authorised administrators only</div>
  <div class="links"><a href="index.html">← Website</a><a href="login.html">Client Login</a></div>
</div>
</body>
</html>
