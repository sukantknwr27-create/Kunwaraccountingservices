<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="shortcut icon" href="favicon.svg"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pay Now | Kunwar Accounting Services Delhi</title>
  <meta name="description" content="Pay for accounting services via UPI, Bank Transfer or PayTM. Kunwar Accounting Services, Dwarka Delhi."/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .pay-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:1.5rem;margin-top:2rem;}
    .pay-card{background:white;border:1.5px solid var(--border);border-radius:16px;padding:2rem;text-align:center;transition:all 0.25s;}
    .pay-card:hover{border-color:var(--navy);box-shadow:0 8px 24px rgba(12,68,124,0.08);}
    .pay-card.disabled{opacity:0.4;pointer-events:none;}
    .pay-icon{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:26px;}
    .pay-card h3{font-size:17px;font-weight:600;color:var(--charcoal);margin-bottom:6px;}
    .pay-card p{font-size:13px;color:var(--gray);margin-bottom:1.25rem;line-height:1.6;}
    .upi-id{background:var(--ice);border-radius:8px;padding:10px 16px;font-size:14px;font-weight:600;color:var(--navy);margin-bottom:1rem;}
    .copy-btn{background:none;border:1.5px solid var(--navy);color:var(--navy);padding:8px 20px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
    .copy-btn:hover{background:var(--ice);}
    .qr-box{width:160px;height:160px;margin:0 auto 1rem;background:var(--light);border:2px dashed var(--border);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}
    .qr-box p{font-size:11px;color:var(--gray);text-align:center;line-height:1.4;}
    .bank-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;}
    .bank-row:last-child{border-bottom:none;}
    .bank-row span:first-child{color:var(--gray);}
    .bank-row span:last-child{font-weight:600;color:var(--charcoal);}
    .steps-list{list-style:none;text-align:left;margin-top:0.75rem;}
    .steps-list li{font-size:13px;color:var(--gray);padding:5px 0;display:flex;align-items:flex-start;gap:8px;}
    .steps-list li::before{content:attr(data-n);width:20px;height:20px;border-radius:50%;background:var(--navy);color:white;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
    .loading{text-align:center;padding:3rem;color:var(--gray);}
  </style>
</head>
<body>
<div id="nav-placeholder"></div>
<main>
  <div class="page-hero"><h1>Pay for Services</h1><p>Choose your preferred payment method — all payments are secure</p></div>
  <div class="section">
    <div id="payment-container"><div class="loading">⏳ Loading payment options...</div></div>
    <div id="payment-note-box" style="display:none;"></div>
    <div style="text-align:center;margin-top:2rem;padding:2rem;background:var(--light);border-radius:16px;">
      <p style="font-size:15px;color:var(--charcoal);margin-bottom:1rem;">Not sure how much to pay? Check our packages.</p>
      <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;">
        <a href="packages.html" class="btn-primary">View Packages</a>
        <a href="#" id="whatsapp-pay-link" class="whatsapp-btn" style="margin-top:0;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Ask on WhatsApp
        </a>
      </div>
    </div>
  </div>
</main>
<div id="footer-placeholder"></div>
<script src="supabase.js"></script><script src="nav.js"></script>
<script>
injectNav('payment');

async function loadPayment() {
  try {
    const settings = await sbFetch('payment_settings','GET',null,'?limit=1');
    const s = settings?.[0];

    if (!s) {
      document.getElementById('payment-container').innerHTML = '<div class="loading">Payment details loading. Please contact us on WhatsApp.</div>';
      return;
    }

    // Build WhatsApp link
    document.getElementById('whatsapp-pay-link').href = `https://wa.me/918076136300?text=Hi!%20I%20want%20to%20make%20a%20payment.`;

    let cardsHtml = '';

    // UPI Card
    if (s.upi_enabled) {
      cardsHtml += `
        <div class="pay-card">
          <div class="pay-icon" style="background:#E6F1FB;">📱</div>
          <h3>UPI / QR Code</h3>
          <p>Scan with Google Pay, PhonePe, BHIM or any UPI app</p>
          <div class="qr-box">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            <p>Scan QR or use UPI ID below</p>
          </div>
          <div class="upi-id" id="upi-display">${s.upi_id || 'UPI ID not set'}</div>
          <button class="copy-btn" onclick="copyUPI('${s.upi_id || ''}')">Copy UPI ID</button>
        </div>`;
    }

    // Bank Transfer Card
    if (s.bank_enabled && (s.bank_name || s.bank_account)) {
      cardsHtml += `
        <div class="pay-card">
          <div class="pay-icon" style="background:#EAF3DE;">🏦</div>
          <h3>Bank Transfer / NEFT</h3>
          <p>Direct bank transfer for corporate clients or larger payments</p>
          <div style="background:var(--light);border-radius:12px;padding:1rem 1.25rem;text-align:left;margin-bottom:1rem;">
            ${s.bank_name ? `<div class="bank-row"><span>Bank Name</span><span>${s.bank_name}</span></div>` : ''}
            ${s.bank_account ? `<div class="bank-row"><span>Account No.</span><span>${s.bank_account}</span></div>` : ''}
            ${s.bank_ifsc ? `<div class="bank-row"><span>IFSC Code</span><span>${s.bank_ifsc}</span></div>` : ''}
            <div class="bank-row"><span>Account Name</span><span>Sukant Kunwar</span></div>
          </div>
        </div>`;
    }

    // PayTM Card
    if (s.paytm_enabled && s.paytm_number) {
      cardsHtml += `
        <div class="pay-card">
          <div class="pay-icon" style="background:#E1F5EE;">💚</div>
          <h3>PayTM</h3>
          <p>Pay via PayTM wallet, UPI or PayTM bank</p>
          <div class="qr-box">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            <p>Scan QR or send to number</p>
          </div>
          <div class="upi-id">${s.paytm_number}</div>
          <ul class="steps-list">
            <li data-n="1">Open PayTM and tap "Pay"</li>
            <li data-n="2">Scan QR or enter number above</li>
            <li data-n="3">Enter amount and pay</li>
            <li data-n="4">Send screenshot to WhatsApp</li>
          </ul>
        </div>`;
    }

    document.getElementById('payment-container').innerHTML = `<div class="pay-grid">${cardsHtml}</div>`;

    // Payment note
    if (s.payment_note) {
      document.getElementById('payment-note-box').style.display = 'block';
      document.getElementById('payment-note-box').innerHTML = `
        <div style="background:#FEF3C7;border:1px solid #FCD34D;border-radius:12px;padding:1.25rem 1.5rem;margin-top:1.5rem;display:flex;gap:12px;align-items:flex-start;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#92400E" stroke-width="2" style="flex-shrink:0;margin-top:2px;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <div><p style="font-size:14px;font-weight:600;color:#92400E;margin-bottom:4px;">After making payment</p><p style="font-size:13px;color:#78350F;line-height:1.7;">${s.payment_note}</p></div>
        </div>`;
    }

  } catch(e) {
    console.error(e);
    document.getElementById('payment-container').innerHTML = '<div class="loading">Payment details unavailable. Please contact us on WhatsApp.</div>';
  }
}

function copyUPI(upiId) {
  if (!upiId) return;
  navigator.clipboard.writeText(upiId).then(() => {
    const b = document.querySelector('.copy-btn');
    b.textContent = '✓ Copied!'; b.style.background = '#DCFCE7'; b.style.borderColor = '#16A34A'; b.style.color = '#16A34A';
    setTimeout(() => { b.textContent = 'Copy UPI ID'; b.style.background = ''; b.style.borderColor = ''; b.style.color = ''; }, 2500);
  });
}

loadPayment();
</script>
</body>
</html>
